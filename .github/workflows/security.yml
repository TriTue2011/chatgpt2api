# Security gate — chạy TRƯỚC build. Chặn secret lộ + SAST high + audit dependency.
# Chuẩn ngành 2025 (OWASP): gitleaks (secret), bandit (SAST high), pip/npm audit (SCA).
name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 2 * * 1"   # quét sâu định kỳ (thứ Hai 02:00 UTC)

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      # P1#10: pin major action tags; bump intentionally (digest-pin when org policy requires)
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # gitleaks quét cả lịch sử
      - name: Gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Bandit HIGH (hard-fail)
        run: |
          pip install bandit
          # -lll = HIGH only (critical operational findings). Medium vẫn xem ở bước dưới.
          bandit -r services api utils -lll -x test
      - name: Bandit medium report (soft)
        run: |
          bandit -r services api utils -ll -x test || true
      - name: Semgrep (OWASP rules, soft until baseline clean)
        uses: semgrep/semgrep-action@v1
        with:
          config: p/owasp-top-ten
        continue-on-error: true

  deps-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: pip-audit (Python SCA — fail on known vulns)
        run: |
          # Export deps KHÔNG hash. pip-audit không hash được VCS (git+) dep
          # (vd gemini-webapi từ GitHub) → nội bộ pip lỗi "can't verify hashes
          # for VCS repos". Bỏ --hash + lọc dòng git → audit các gói PyPI còn
          # lại (VCS dep build trong Docker, ngoài phạm vi CVE của pip-audit).
          uv export --format requirements-txt --no-dev --no-hashes -o /tmp/reqs.raw.txt 2>/dev/null \
            || uv export --format requirements-txt --no-hashes -o /tmp/reqs.raw.txt
          grep -vE '(git\+|@ git|^-e )' /tmp/reqs.raw.txt > /tmp/reqs.txt || true
          if [ -s /tmp/reqs.txt ]; then
            uvx pip-audit -r /tmp/reqs.txt --no-deps --progress-spinner off \
              || { echo "::error::pip-audit found vulnerabilities — fix or pin with justification"; exit 1; }
          else
            echo "No requirements export; skip hard fail"
          fi
      - name: npm audit high/critical (web SCA)
        working-directory: web
        run: |
          # --audit-level=high: chỉ fail high/critical
          npm audit --omit=dev --audit-level=high \
            || { echo "::error::npm audit high/critical findings"; exit 1; }
