# ============================================================
# chatgpt2api — Docker Compose cho Portainer
# Tích hợp 9router-chat: OpenCode free, image adapters, search, backup
# ============================================================
#
# Cách dùng trong Portainer:
# 1. Tạo Stack mới → Paste nội dung file này
# 2. Sửa CHATGPT2API_AUTH_KEY thành key của bạn
# 3. Deploy
#
# Hoặc dùng CLI:
#   docker compose up -d
# ============================================================

services:
  chatgpt2api:
    # ── Image từ GitHub Container Registry (khuyên dùng) ──
    image: ghcr.io/tritue2011/chatgpt2api:latest

    # ── Hoặc build từ source ──
    # build:
    #   context: .
    #   dockerfile: Dockerfile

    container_name: chatgpt2api
    restart: unless-stopped

    ports:
      - "3000:80"

    volumes:
      # Dữ liệu persistent: accounts, config, models cache, ảnh, backup, logs
      # Dùng bind mount đến thư mục thật trên host → không bao giờ mất khi build lại
      - ./chatgpt2api-data:/app/data

    environment:
      # [BẮT BUỘC] Auth key bảo vệ API
      CHATGPT2API_AUTH_KEY: your_secret_key_here

      # [Tùy chọn] Public base URL cho link ảnh
      # CHATGPT2API_BASE_URL: https://your-domain.com

      # [Tùy chọn] Storage backend: json (mặc định), sqlite, postgres, git
      STORAGE_BACKEND: json

      # [Tùy chọn] Database URL nếu dùng sqlite/postgres
      # DATABASE_URL: sqlite:///app/data/accounts.db

    # Healthcheck — kiểm tra API có sống không
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/version')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# Không cần khai báo volumes ở cuối nữa — dùng bind mount ./chatgpt2api-data
